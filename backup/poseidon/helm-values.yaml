COMPUTED VALUES:
affinity: {}
createNamespace: false
fullnameOverride: dra-gpu-nic-webhook
imagePullSecrets: []
mutatingWebhook:
  mutate:
    failurePolicy: Fail
    namespaceSelector:
      matchLabels:
        dra.llm-d.io/webhook-enabled: "true"
    reinvocationPolicy: IfNeeded
    timeoutSeconds: 10
  mutateExt:
    enabled: true
    excludedNamespaces:
      custom: []
      kubernetes:
      - kube-system
      - kube-public
      - kube-node-lease
      nvidia:
      - nvidia-gpu-operator
      - nvidia-network-operator
      openshift:
      - openshift-apiserver
      - openshift-controller-manager
      - openshift-etcd
      - openshift-kube-apiserver
      - openshift-kube-controller-manager
      - openshift-kube-scheduler
      - openshift-machine-api
      - openshift-machine-config-operator
      - openshift-monitoring
      - openshift-network-operator
      - openshift-sdn
      - openshift-ovn-kubernetes
    failurePolicy: Ignore
    reinvocationPolicy: IfNeeded
    timeoutSeconds: 10
nameOverride: ""
namespace: dra-webhook-system
nodeSelector: {}
pdb:
  enabled: true
  minAvailable: 1
podAnnotations: {}
reconciler:
  extraArgs: []
  healthPort: 8080
  image:
    pullPolicy: Always
    repository: ghcr.io/openshift-psap/dra-rail-admission-webhook/reconciler
    tag: pr-20
  replicas: 1
  resources:
    limits:
      cpu: 100m
      memory: 128Mi
    requests:
      cpu: 25m
      memory: 64Mi
reconcilerConfig:
  autoReap: false
  gracePeriod: 10m
  interval: 5m
  pruneAfter: 168h
  statePath: /data/reconciler-state.json
reconcilerPvc:
  accessModes:
  - ReadWriteOnce
  enabled: true
  size: 100Mi
  storageClassName: ""
serviceAccount:
  annotations: {}
tls:
  caBundle: ""
  certManager:
    duration: 8760h
    issuerRef:
      group: cert-manager.io
      kind: Issuer
      name: ""
    renewBefore: 720h
  mode: helm-generated
  secretName: dra-gpu-nic-webhook-tls
tolerations: []
topologySpreadConstraints:
  enabled: true
  maxSkew: 1
  topologyKey: kubernetes.io/hostname
  whenUnsatisfiable: DoNotSchedule
webhook:
  extraArgs: []
  image:
    pullPolicy: Always
    repository: ghcr.io/openshift-psap/dra-rail-admission-webhook/webhook
    tag: pr-20
  port: 8443
  replicas: 2
  resources:
    limits:
      cpu: 200m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi
webhookConfig:
  gpuDeviceClassName: gpu.nvidia.com
  interceptExtendedResources:
  - deviceClassName: gpu.nvidia.com
    resourceName: nvidia.com/gpu
  maxPairsPerNUMA: 4
  maxPairsPerNode: 8
  nicConfig:
    crossRailCIDR: 10.0.0.0/13
    interfacePrefix: net
    mtu: 9000
    rails:
    - gateway: 10.0.0.1
      ipv4Prefix: 10.0.
      subnet: 10.0.0.0/16
    - gateway: 10.1.0.1
      ipv4Prefix: 10.1.
      subnet: 10.1.0.0/16
    - gateway: 10.2.0.1
      ipv4Prefix: 10.2.
      subnet: 10.2.0.0/16
    - gateway: 10.3.0.1
      ipv4Prefix: 10.3.
      subnet: 10.3.0.0/16
    - gateway: 10.4.0.1
      ipv4Prefix: 10.4.
      subnet: 10.4.0.0/16
    - gateway: 10.5.0.1
      ipv4Prefix: 10.5.
      subnet: 10.5.0.0/16
    - gateway: 10.6.0.1
      ipv4Prefix: 10.6.
      subnet: 10.6.0.0/16
    - gateway: 10.7.0.1
      ipv4Prefix: 10.7.
      subnet: 10.7.0.0/16
    rdmaRequired: true
    startingTableId: 100
  nicDeviceClassName: dranet
  preflightCheck: false
  transportMode: ethernet
webhookPvc:
  accessModes:
  - ReadWriteOnce
  enabled: false
  size: 100Mi
  storageClassName: ""
