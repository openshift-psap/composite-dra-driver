name: Build and Push Images

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        component: [driver, webhook]

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          target: ${{ matrix.component }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/composite-dra-${{ matrix.component }}:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/composite-dra-${{ matrix.component }}:latest
