name: Build PR Images

on:
  issue_comment:
    types: [created]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  start:
    if: |
      (github.event_name == 'pull_request' &&
       !github.event.pull_request.head.repo.fork &&
       (github.event.pull_request.author_association == 'MEMBER' ||
        github.event.pull_request.author_association == 'OWNER' ||
        github.event.pull_request.author_association == 'COLLABORATOR')) ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       contains(github.event.comment.body, '/build-approved') &&
       (github.event.comment.author_association == 'MEMBER' ||
        github.event.comment.author_association == 'OWNER' ||
        github.event.comment.author_association == 'COLLABORATOR'))
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    outputs:
      number: ${{ steps.pr.outputs.number }}
      ref: ${{ steps.pr.outputs.ref }}
      sha: ${{ steps.pr.outputs.sha }}
      comment-id: ${{ steps.comment.outputs.comment-id }}
    steps:
      - name: Get PR ref
        id: pr
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "number=${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
            echo "ref=${{ github.event.pull_request.head.ref }}" >> $GITHUB_OUTPUT
            echo "sha=${{ github.event.pull_request.head.sha }}" >> $GITHUB_OUTPUT
          else
            echo "number=$PR_NUMBER" >> $GITHUB_OUTPUT
            PR_DATA=$(gh api repos/${{ github.repository }}/pulls/$PR_NUMBER)
            HEAD_REPO_FORK=$(echo $PR_DATA | jq -r .head.repo.fork)
            if [ "$HEAD_REPO_FORK" = "true" ]; then
              echo "::error::Refusing to build fork PR"
              exit 1
            fi
            echo "ref=$(echo $PR_DATA | jq -r .head.ref)" >> $GITHUB_OUTPUT
            echo "sha=$(echo $PR_DATA | jq -r .head.sha)" >> $GITHUB_OUTPUT
          fi
        env:
          PR_NUMBER: ${{ github.event.issue.number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment build started
        id: comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ steps.pr.outputs.number }}
          body: |
            :hourglass_flowing_sand: **Building images** for `${{ steps.pr.outputs.sha }}`...

            | Component | Status |
            |-----------|--------|
            | driver    | :yellow_circle: building |
            | webhook   | :yellow_circle: building |

  build:
    needs: start
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      pull-requests: write

    strategy:
      fail-fast: false
      matrix:
        component: [driver, webhook]

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.start.outputs.ref }}

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          target: ${{ matrix.component }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/composite-dra-${{ matrix.component }}:pr-${{ needs.start.outputs.number }}
            ghcr.io/${{ github.repository_owner }}/composite-dra-${{ matrix.component }}:${{ needs.start.outputs.sha }}

  report:
    needs: [start, build]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Comment success
        if: needs.build.result == 'success'
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ needs.start.outputs.comment-id }}
          edit-mode: replace
          body: |
            :white_check_mark: **Images built and pushed** for `${{ needs.start.outputs.sha }}`

            | Component | Status |
            |-----------|--------|
            | driver    | :green_circle: pushed |
            | webhook   | :green_circle: pushed |

            ```
            ghcr.io/${{ github.repository_owner }}/composite-dra-driver:pr-${{ needs.start.outputs.number }}
            ghcr.io/${{ github.repository_owner }}/composite-dra-webhook:pr-${{ needs.start.outputs.number }}
            ```

      - name: Comment failure
        if: needs.build.result == 'failure'
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ needs.start.outputs.comment-id }}
          edit-mode: replace
          body: |
            :x: **Image build failed** for `${{ needs.start.outputs.sha }}`

            [View build logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
