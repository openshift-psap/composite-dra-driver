namespace: composite-dra-system

driver:
  name: "composite.dra.example.io"
  image:
    repository: ghcr.io/openshift-psap/composite-dra-driver
    tag: latest
    pullPolicy: Always
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
  stateDir: /var/lib/composite-dra
  pluginDir: /var/lib/kubelet/plugins
  verbosity: 2

webhook:
  # Mode: "auto" | "enabled" | "disabled"
  #   auto:     deploy webhook on K8s <1.36, skip on >=1.36 (DRAExtendedResource beta)
  #   enabled:  always deploy (e.g. K8s 1.35 without DRAExtendedResource gate)
  #   disabled: never deploy (e.g. K8s 1.35 with DRAExtendedResource manually enabled)
  mode: auto
  image:
    repository: ghcr.io/openshift-psap/composite-dra-webhook
    tag: latest
    pullPolicy: Always
  replicas: 2
  port: 8443
  # DEPRECATED: use per-composition deviceClassName/extendedResourceName in compositions[] instead.
  # Kept for backward compatibility with single-composition configs.
  # deviceClassName: composite-gpu-nic
  # resourceName: "composite.dra/gpu-nic-pair"
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi
  # Opt-out namespace model: webhook intercepts all namespaces EXCEPT these.
  # matchConditions CEL ensures only pods with the synthetic resource are sent to webhook.
  excludedNamespaces:
    kubernetes:
      - kube-system
      - kube-public
      - kube-node-lease
    openshift:
      - openshift-apiserver
      - openshift-controller-manager
      - openshift-etcd
      - openshift-kube-apiserver
      - openshift-kube-controller-manager
      - openshift-kube-scheduler
      - openshift-machine-api
      - openshift-machine-config-operator
      - openshift-monitoring
      - openshift-network-operator
      - openshift-sdn
      - openshift-ovn-kubernetes
    nvidia:
      - nvidia-gpu-operator
      - nvidia-network-operator
    custom: []
  failurePolicy: Fail
  tls:
    # Mode: "helm-generated" | "cert-manager" | "manual"
    #   helm-generated: self-signed CA + cert via Helm genSignedCert (no dependencies)
    #   cert-manager:   cert-manager Certificate CR (requires cert-manager + Issuer)
    #   manual:         user creates TLS secret before install, provides caBundle
    mode: helm-generated
    certManager:
      issuerRef:
        name: ""
        kind: Issuer
        group: cert-manager.io
    caBundle: ""  # base64-encoded CA cert for manual mode

imagePullSecrets: []

# DEPRECATED: DeviceClasses are now auto-generated per composition.
# Each composition produces a DeviceClass named "composite-<composition.name>"
# with a CEL selector filtering by compositionName attribute.
# Override per composition with deviceClassName/extendedResourceName fields.
# deviceClass:
#   name: composite-gpu-nic
#   selector: 'device.driver == "composite.dra.example.io"'
#   extendedResourceName: ""

sources:
  - name: gpu
    driver: "gpu.nvidia.com"
    deviceClassName: "gpu.nvidia.com"
    forwardAttributes:
      - domain: "resource.kubernetes.io"
        attributes: ["pciBusID", "pcieRoot"]
      - domain: "gpu.nvidia.com"
        attributes: ["model", "memory"]
  - name: nic
    driver: "dra.net"
    deviceClassName: "dranet"
    forwardAttributes:
      - domain: "dra.net"
        attributes: ["ifName", "pciAddress", "numaNode", "rdma", "encapsulation", "ipv4", "mac"]
      - domain: "resource.kubernetes.io"
        attributes: ["pcieRoot"]

compositions:
  - name: "gpu-nic-pair"
    # deviceClassName: "composite-gpu-nic-pair"        # optional, defaults to "composite-<name>"
    # extendedResourceName: ""                          # optional, defaults to "<driver.name>/<name>"
    members:
      - source: gpu
        count: 1
      - source: nic
        count: 1
    constraints:
      - type: matchAttribute
        attribute: "resource.kubernetes.io/pcieRoot"
    filters:
      nic:
        cel: 'device.attributes["dra.net"].rdma == true'
    pairingMode: "auto"
    transportMode: "ethernet"
    # Explicit pairing mode: use CEL selectors to manually pair devices.
    # Set pairingMode: "explicit" and define nodePools with per-pool pairs.
    # Each pair's selectors map source names to CEL expressions that select
    # devices by attribute values (e.g. PCI bus ID).
    #
    # Selector behavior:
    #   - A selector that matches exactly one device is deterministic.
    #   - A selector that matches multiple devices picks the first available
    #     (non-deterministic). Consumed devices are excluded from later pairs,
    #     so broad selectors still produce unique assignments — but which device
    #     lands in which pair depends on ResourceSlice ordering.
    #   - For deterministic pairing, use exact-match selectors (e.g. pciBusID).
    #
    # nodePoolLabelKey: "node.kubernetes.io/instance-type"
    # nodePools:
    #   - label: "Standard_ND96isr_H100_v5"
    #     pairs:
    #       - selectors:
    #           gpu: 'device.attributes["resource.kubernetes.io"].pciBusID == "0001:00:00.0"'
    #           nic: 'device.attributes["dra.net"].pciAddress == "0101:00:00.0"'
    #         rail: 0
    #         numa: 0
  - name: "gpu"
    members:
      - source: gpu
        count: 1

# External device params ConfigMap name. When set, mounted into driver pods.
# The ConfigMap provides opaque driver params for shadow claims — see examples/ for format.
# deviceParamsConfigMap: ""

# deviceParams:
#   configMapPath: "/etc/composite-dra/device-params/params.yaml"

openshift:
  scc:
    enabled: false
