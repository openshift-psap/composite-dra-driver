{{- if eq (include "composite-dra.webhookNeeded" .) "true" }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "composite-dra.fullname" . }}-webhook
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "composite-dra.labels" . | nindent 4 }}
    app.kubernetes.io/component: webhook
spec:
  replicas: {{ .Values.webhook.replicas }}
  selector:
    matchLabels:
      {{- include "composite-dra.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: webhook
  template:
    metadata:
      labels:
        {{- include "composite-dra.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: webhook
    spec:
      serviceAccountName: {{ include "composite-dra.fullname" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: webhook
          image: "{{ .Values.webhook.image.repository }}:{{ .Values.webhook.image.tag }}"
          imagePullPolicy: {{ .Values.webhook.image.pullPolicy }}
          args:
            - --port={{ .Values.webhook.port }}
            - --tls-cert=/etc/webhook/certs/tls.crt
            - --tls-key=/etc/webhook/certs/tls.key
            {{- range .Values.compositions }}
            - --resource-mapping={{ printf "%s/%s=%s" $.Values.driver.name .name (.deviceClassName | default (printf "composite-%s" .name)) }}
            {{- end }}
          ports:
            - containerPort: {{ .Values.webhook.port }}
              name: https
              protocol: TCP
            {{- if .Values.metrics.enabled }}
            - containerPort: {{ .Values.metrics.port }}
              name: metrics
              protocol: TCP
            {{- end }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: https
              scheme: HTTPS
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.webhook.resources | nindent 12 }}
          volumeMounts:
            - name: tls-certs
              mountPath: /etc/webhook/certs
              readOnly: true
      volumes:
        - name: tls-certs
          secret:
            secretName: {{ include "composite-dra.fullname" . }}-webhook-tls
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "composite-dra.fullname" . }}-webhook
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "composite-dra.labels" . | nindent 4 }}
    app.kubernetes.io/component: webhook
spec:
  ports:
    - port: 443
      targetPort: https
      name: https
      protocol: TCP
    {{- if .Values.metrics.enabled }}
    - port: {{ .Values.metrics.port }}
      targetPort: metrics
      name: metrics
      protocol: TCP
    {{- end }}
  selector:
    {{- include "composite-dra.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: webhook
{{- end }}
