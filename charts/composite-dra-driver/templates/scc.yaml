{{- if .Values.openshift.scc.enabled }}
apiVersion: security.openshift.io/v1
kind: SecurityContextConstraints
metadata:
  name: {{ include "composite-dra.fullname" . }}
  labels:
    {{- include "composite-dra.labels" . | nindent 4 }}
allowPrivilegedContainer: true
allowHostDirVolumePlugin: true
allowHostNetwork: false
allowHostPorts: false
allowHostPID: false
allowHostIPC: false
readOnlyRootFilesystem: false
runAsUser:
  type: RunAsAny
seLinuxContext:
  type: RunAsAny
fsGroup:
  type: RunAsAny
supplementalGroups:
  type: RunAsAny
volumes:
  - configMap
  - hostPath
  - emptyDir
  - projected
  - secret
users:
  - system:serviceaccount:{{ .Values.namespace }}:{{ include "composite-dra.fullname" . }}
{{- end }}
