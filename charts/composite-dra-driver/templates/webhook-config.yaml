{{- if .Values.webhook.enabled }}
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: {{ include "composite-dra.fullname" . }}-webhook
  labels:
    {{- include "composite-dra.labels" . | nindent 4 }}
  {{- if eq .Values.webhook.tls.mode "cert-manager" }}
  annotations:
    cert-manager.io/inject-ca-from: {{ .Values.namespace }}/{{ include "composite-dra.fullname" . }}-webhook-tls
  {{- end }}
webhooks:
  - name: composite-dra.webhook.k8s.io
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: {{ .Values.webhook.failurePolicy }}
    clientConfig:
      service:
        name: {{ include "composite-dra.fullname" . }}-webhook
        namespace: {{ .Values.namespace }}
        path: /mutate
        port: 443
    rules:
      - operations: ["CREATE"]
        apiGroups: [""]
        apiVersions: ["v1"]
        resources: ["pods"]
    {{- with .Values.webhook.namespaceSelector }}
    namespaceSelector:
      {{- toYaml . | nindent 6 }}
    {{- end }}
{{- end }}
