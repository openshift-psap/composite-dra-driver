apiVersion: v1
kind: ConfigMap
metadata:
  name: composite-dra-config
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "composite-dra.labels" . | nindent 4 }}
data:
  config.yaml: |
    driver:
      name: {{ .Values.driver.name | quote }}

    sources:
      {{- toYaml .Values.sources | nindent 6 }}

    compositions:
      {{- toYaml .Values.compositions | nindent 6 }}

    {{- if .Values.railConfig }}
    railConfig:
      {{- toYaml .Values.railConfig | nindent 6 }}
    {{- end }}
