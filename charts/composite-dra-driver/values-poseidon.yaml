openshift:
  scc:
    enabled: true

railConfig:
  interfacePrefix: "net"
  startingTableID: 100
  crossRailCIDR: "10.0.0.0/13"
  rails:
    - selector:
        cel: 'device.attributes["dra.net"].ipv4.startsWith("10.0.")'
      config:
        subnet: "10.0.0.0/16"
        gateway: "10.0.0.1"
        mtu: 9000
        tableID: 100
    - selector:
        cel: 'device.attributes["dra.net"].ipv4.startsWith("10.1.")'
